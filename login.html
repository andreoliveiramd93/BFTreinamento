<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Centro de Treinamento BeachFlow</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: url('background.jpg') center/cover fixed no-repeat;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      background: #111827;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.06);
      width: 100%;
      max-width: 400px;
    }

    .login-container h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 24px;
      color: #f8fafc;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #cbd5e1;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.04);
      color: #f8fafc;
      font-size: 16px;
    }

    .form-group input:focus {
      outline: none;
      border-color: #60a5fa;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #1d4ed8;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    .login-btn:hover {
      background: #2563eb;
    }

    .message {
      margin-top: 20px;
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(248,113,113,0.14);
      border: 1px solid rgba(248,113,113,0.4);
      color: #fee2e2;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Login - Centro de Treinamento BeachFlow</h1>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Login</label>
        <input type="text" id="username" name="username" required />
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" required />
      </div>
      <button type="submit" class="login-btn">Entrar</button>
    </form>
    <div id="message" class="message"></div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(event) {
      event.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const messageEl = document.getElementById('message');

      if (username === 'AdminBF' && password === 'BF2026') {
        localStorage.setItem('loggedIn', 'true');
        window.location.href = 'admin.html';
      } else {
        messageEl.textContent = 'Login ou senha incorretos.';
        messageEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
